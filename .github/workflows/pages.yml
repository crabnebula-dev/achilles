name: Deploy Pages

# Builds the browser WASM demo into docs/browser/ and publishes the whole docs/
# site (existing landing page at the root + the demo at /browser/) to GitHub
# Pages. Shows up as a check on PRs that push to the branch.
#
# Requires the repo's Pages "Source" to be set to **GitHub Actions** (Settings →
# Pages). `configure-pages` with `enablement: true` tries to flip that
# automatically; if the token lacks permission, set it once by hand.

on:
  push:
    branches: [main, browser-wasm-target]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      # GitHub-hosted runners ship a stable Rust toolchain; just add the target.
      - run: rustup target add wasm32-unknown-unknown
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ github.job }}-
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build the browser demo into docs/browser
        run: ./scripts/build-demo.sh
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v5
