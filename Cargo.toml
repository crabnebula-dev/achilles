[workspace]
resolver = "2"
members = ["crates/*", "src-tauri"]

[workspace.package]
edition = "2021"
rust-version = "1.80"
license = "PolyForm-Noncommercial-1.0.0"
authors = ["CrabNebula Ltd. <hello@crabnebula.dev>"]
repository = "https://github.com/crabnebula-dev/achilles"

[workspace.dependencies]
# shared detection deps
memchr = "2.7"
memmap2 = "0.9"
plist = "1.7"
regex = "1.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
# async + HTTP + hashing for scan / cve / audit crates
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "sync", "time", "io-util", "fs"] }
futures = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
sha2 = "0.10"
semver = "1"
dirs = "6"
# JS / TS AST parsing for the static-scan rules
oxc_allocator = "0.126"
oxc_ast = "0.126"
oxc_ast_visit = "0.126"
oxc_parser = "0.126"
oxc_span = "0.126"
# internal crates referenced across the workspace
detect = { path = "crates/detect" }
scan = { path = "crates/scan" }
cve = { path = "crates/cve" }
macho-audit = { path = "crates/macho-audit" }
static-scan = { path = "crates/static-scan" }
sideeffects = { path = "crates/sideeffects" }
